<div class="login-container">
  <!-- Top Right Language Switcher -->
  <div class="login-lang-pos">
    <div class="lang-switcher">
      <button 
        class="lang-btn" 
        [class.active]="langService.currentLang() === 'tr'" 
        (click)="setLanguage('tr')" 
        title="Türkçe">
        <span class="flag">🇹🇷</span> TR
      </button>
      <button 
        class="lang-btn" 
        [class.active]="langService.currentLang() === 'en'" 
        (click)="setLanguage('en')" 
        title="English">
        <span class="flag">🇬🇧</span> EN
      </button>
    </div>
  </div>

  <div class="login-content">
    
    <div class="login-header">
      <img src="images/star1.jpeg" alt="Logo" width="55" height="55">
      <span>VaqıvBank</span>
    </div>
    
    <form class="login-form">
      
      <div class="login-form-group">
        <label for="username">{{ 'LOGIN.USERNAME' | translate }}</label>
        <input type="text" id="username" name="username" [placeholder]="'LOGIN.USERNAME_PLACEHOLDER' | translate">
      </div>
      
      <div class="login-form-group">
        <label for="password">{{ 'LOGIN.PASSWORD' | translate }}</label>
        <input type="password" id="password" name="password" [placeholder]="'LOGIN.PASSWORD_PLACEHOLDER' | translate">
      </div>
      
      <button type="button" routerLink="/admin">{{ 'LOGIN.SUBMIT' | translate }}</button>
    
    </form>
  </div>
</div>
