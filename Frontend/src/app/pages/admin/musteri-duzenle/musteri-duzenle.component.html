<h2 class="page-title">Müşteri Bilgilerini Düzenle #{{ musteriId }}</h2>

<div class="form-container" *ngIf="!loading">
    <div class="form-left">
        <div class="form-row-double">
            <div class="form-col">
                <label class="form-label">Ad</label>
                <input type="text" class="form-control" [(ngModel)]="ad">
            </div>
            <div class="form-col" *ngIf="musteriTipi === 1">
                <label class="form-label">Soyad</label>
                <input type="text" class="form-control" [(ngModel)]="soyad">
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">{{ musteriTipi === 1 ? 'TCKN No' : 'VKN No' }}</label>
            <input type="text" class="form-control" [(ngModel)]="kimlikNo">
        </div>

        <div class="form-group">
            <label class="form-label">Durum</label>
            <select class="form-control" [(ngModel)]="aktifMi">
                <option [ngValue]="1">Aktif</option>
                <option [ngValue]="2">Pasif</option>
            </select>
        </div>
    </div>

    <div class="form-right">
        <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" [(ngModel)]="email">
        </div>

        <div class="form-group">
            <label class="form-label">Telefon</label>
            <input type="tel" class="form-control" [(ngModel)]="telefon">
        </div>

        <div class="form-actions">
            <button class="btn-cancel" (click)="iptal()">İptal</button>
            <button class="btn-submit" (click)="guncelle()">Güncelle</button>
        </div>
    </div>
</div>

<div *ngIf="loading" class="loading-container">
    <p>Müşteri bilgileri yükleniyor...</p>
</div>
