<h2 style="font-size: 18px; font-weight: 500; margin-bottom: 30px;">+ Yeni Bireysel Müşteri</h2>

<div class="form-container">
    <div class="form-left">
        <div class="form-group" style="display: flex; gap: 20px;">
            <div style="flex: 1">
                <label class="form-label">Ad</label>
                <input type="text" class="form-control shadow-input" [(ngModel)]="ad" placeholder="Fatih">
            </div>
            <div style="flex: 1">
                <label class="form-label">Soyad</label>
                <input type="text" class="form-control shadow-input" [(ngModel)]="soyad" placeholder="Ayhan">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">TCKN No</label>
            <input type="text" class="form-control shadow-input" [(ngModel)]="tckn" placeholder="11111111110">
        </div>
        <div class="form-group">
            <label class="form-label">Şehir</label>
            <input type="text" class="form-control shadow-input" [(ngModel)]="sehir" placeholder="Adana">
        </div>
        <div class="form-group">
            <label class="form-label">İlçe</label>
            <input type="text" class="form-control shadow-input" [(ngModel)]="ilce" placeholder="Çukurova">
        </div>
        <div class="form-group">
            <label class="form-label">Posta Kodu</label>
            <input type="text" class="form-control shadow-input" [(ngModel)]="postaKodu" placeholder="42100">
        </div>
    </div>

    <div class="form-right">
        <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-control shadow-input" [(ngModel)]="email" placeholder="fatih@ornek.com">
        </div>
        <div class="form-group">
            <label class="form-label">Telefon</label>
            <input type="tel" class="form-control shadow-input" [(ngModel)]="telefon" placeholder="05551234567">
        </div>
        <div class="form-group" style="flex: 1">
            <label class="form-label">Adres</label>
            <textarea class="form-control shadow-input" style="height: 150px; resize: none;" [(ngModel)]="adres" placeholder="Ornek Mahallesi, 11111. sokak
A Blok Kat 1 No:4"></textarea>
        </div>
        
        <div style="text-align: right; margin-top: 20px;">
            <button class="btn-primary shadow-btn" (click)="kaydet()" style="width: 150px; height: 45px; font-size: 18px;">Kaydet</button>
        </div>
    </div>
</div>
